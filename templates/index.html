<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis - Email Sentiment Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .sentiment-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        .sentiment-positive {
            background: #d4edda;
            color: #155724;
        }
        
        .sentiment-negative {
            background: #f8d7da;
            color: #721c24;
        }
        
        .sentiment-neutral {
            background: #e2e3e5;
            color: #383d41;
        }
        
        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .confidence-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            transition: width 0.5s;
        }
        
        .probabilities {
            margin-top: 20px;
        }
        
        .prob-item {
            margin-bottom: 10px;
        }
        
        .prob-label {
            display: inline-block;
            width: 80px;
            font-weight: 600;
        }
        
        .prob-bar {
            display: inline-block;
            height: 20px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            vertical-align: middle;
            transition: width 0.5s;
        }
        
        .similar-text {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            font-style: italic;
        }
        
        .batch-results {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .batch-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Email Sentiment Analyzer</h1>
            <p>Analyze the sentiment of emails and text messages using Graph Neural Networks</p>
        </div>
        
        <div class="card">
            <h2>Single Sentence Analysis</h2>
            <div class="input-group">
                <label for="sentence">Enter your text:</label>
                <textarea id="sentence" rows="4" placeholder="Type or paste your text here..."></textarea>
            </div>
            <button onclick="analyzeSingle()">Analyze Sentiment</button>
            
            <div class="loading" id="singleLoading">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>
            
            <div class="result" id="singleResult">
                <div id="sentimentBadge" class="sentiment-badge"></div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill">0%</div>
                </div>
                <div class="probabilities" id="probabilities"></div>
                <div id="similarText" class="similar-text" style="display: none;"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>Batch Analysis</h2>
            <div class="input-group">
                <label for="batchText">Enter multiple sentences (one per line):</label>
                <textarea id="batchText" rows="6" placeholder="I love this product!&#10;Very disappointed.&#10;It's okay, nothing special."></textarea>
            </div>
            <button onclick="analyzeBatch()">Analyze Batch</button>
            
            <div class="loading" id="batchLoading">
                <div class="spinner"></div>
                <p>Analyzing batch...</p>
            </div>
            
            <div class="result" id="batchResult">
                <div class="batch-results" id="batchResults"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>Model Statistics</h2>
            <button onclick="loadStats()">Load Statistics</button>
            <div id="statsContainer"></div>
        </div>
    </div>
    
    <script>
        async function analyzeSingle() {
            const sentence = document.getElementById('sentence').value.trim();
            if (!sentence) {
                alert('Please enter some text to analyze');
                return;
            }
            
            const loading = document.getElementById('singleLoading');
            const resultDiv = document.getElementById('singleResult');
            
            loading.classList.add('show');
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sentence: sentence })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displaySingleResult(data);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        }
        
        function displaySingleResult(data) {
            const resultDiv = document.getElementById('singleResult');
            const badge = document.getElementById('sentimentBadge');
            const confidenceFill = document.getElementById('confidenceFill');
            const probsDiv = document.getElementById('probabilities');
            const similarText = document.getElementById('similarText');
            
            // Set sentiment badge
            badge.textContent = data.sentiment;
            badge.className = `sentiment-badge sentiment-${data.sentiment.toLowerCase()}`;
            
            // Set confidence bar
            const confidence = data.confidence;
            confidenceFill.style.width = `${confidence}%`;
            confidenceFill.textContent = `${confidence}%`;
            
            // Display probabilities
            probsDiv.innerHTML = '<h3>Confidence Levels:</h3>';
            for (const [label, prob] of Object.entries(data.probabilities)) {
                probsDiv.innerHTML += `
                    <div class="prob-item">
                        <span class="prob-label">${label}:</span>
                        <span class="prob-bar" style="width: ${prob}%"></span>
                        <span style="margin-left: 10px;">${prob}%</span>
                    </div>
                `;
            }
            
            // Show similar text if available
            if (data.similar_sentence) {
                similarText.style.display = 'block';
                similarText.innerHTML = `
                    <strong>📝 Most similar training example:</strong><br>
                    "${data.similar_sentence}"<br>
                    <small>Similarity score: ${data.similarity_score}</small>
                `;
            } else {
                similarText.style.display = 'none';
            }
            
            resultDiv.classList.add('show');
        }
        
        async function analyzeBatch() {
            const text = document.getElementById('batchText').value;
            const sentences = text.split('\n').filter(s => s.trim());
            
            if (sentences.length === 0) {
                alert('Please enter at least one sentence');
                return;
            }
            
            const loading = document.getElementById('batchLoading');
            const resultDiv = document.getElementById('batchResult');
            const resultsContainer = document.getElementById('batchResults');
            
            loading.classList.add('show');
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/batch_predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sentences: sentences })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultsContainer.innerHTML = '';
                    data.results.forEach((item, index) => {
                        const sentimentClass = item.sentiment.toLowerCase();
                        resultsContainer.innerHTML += `
                            <div class="batch-item">
                                <strong>${index + 1}.</strong> "${item.sentence.substring(0, 100)}${item.sentence.length > 100 ? '...' : ''}"<br>
                                <span class="sentiment-badge sentiment-${sentimentClass}" style="font-size: 0.9rem; margin-top: 5px;">${item.sentiment}</span>
                                <span style="margin-left: 10px;">Confidence: ${item.confidence}%</span>
                                <div style="margin-top: 5px;">
                                    ${Object.entries(item.probabilities).map(([label, prob]) => 
                                        `<span style="margin-right: 15px;">${label}: ${prob}%</span>`
                                    ).join('')}
                                </div>
                            </div>
                        `;
                    });
                    resultDiv.classList.add('show');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        }
        
        async function loadStats() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<div class="loading show"><div class="spinner"></div><p>Loading stats...</p></div>';
            
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                
                if (!data.error) {
                    const classNames = data.class_names;
                    const classDist = data.class_distribution;
                    
                    container.innerHTML = `
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number">${data.graph_stats.num_nodes}</div>
                                <div class="stat-label">Total Nodes</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.graph_stats.num_edges}</div>
                                <div class="stat-label">Total Edges</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.graph_stats.average_degree}</div>
                                <div class="stat-label">Average Degree</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.graph_stats.feature_dim}</div>
                                <div class="stat-label">Feature Dimension</div>
                            </div>
                        </div>
                        <h3>Class Distribution:</h3>
                        <div class="stats">
                            ${Object.entries(classDist).map(([classId, count]) => `
                                <div class="stat-card">
                                    <div class="stat-number">${count}</div>
                                    <div class="stat-label">${classNames[classId]}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number">${data.model_info.input_dim}</div>
                                <div class="stat-label">Input Dimension</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.model_info.hidden_dim}</div>
                                <div class="stat-label">Hidden Dimension</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${data.model_info.output_dim}</div>
                                <div class="stat-label">Output Classes</div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<p style="color: red;">Error loading stats: ${data.error}</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
